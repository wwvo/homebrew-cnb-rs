x-pr-check-paths: &pr-check-paths
  - "Formula/**"
  - "README.md"

x-pr-check-job: &pr-check-job
  name: pr-check
  runner:
    cpus: 1
  stages:
    - name: 校验 tap 元数据
      ifModify: *pr-check-paths
      image: docker.cnb.cool/wwvo/dev-env/python:latest
      script: python bin/validate_ci.py
    - name: 校验 formula URL 可访问性
      ifModify: *pr-check-paths
      image: docker.cnb.cool/wwvo/dev-env/python:latest
      script: python bin/check.py --url-only
    - name: 校验 formula hash
      ifModify: *pr-check-paths
      image: docker.cnb.cool/wwvo/dev-env/python:latest
      script: python bin/check.py --hash-only
    - name: PR 检查完成
      ifModify: *pr-check-paths
      type: cnb:resolve
      options:
        key: pr-check-ready

main:
  pull_request:
    - <<: *pr-check-job
  pull_request.mergeable:
    - stages:
        - name: automerge
          type: git:auto-merge
          options:
            mergeType: squash
            removeSourceBranch: true
