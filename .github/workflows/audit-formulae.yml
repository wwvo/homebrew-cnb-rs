name: Audit Homebrew Formulae

on:
  pull_request:
    paths:
      - "Formula/**"
      - "README.md"
      - "bin/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "Formula/**"
      - "README.md"
      - "bin/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: audit-formulae-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  audit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Homebrew on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Validate tap metadata
        shell: bash
        run: python3 bin/validate_ci.py

      - name: Validate formula URLs
        shell: bash
        run: python3 bin/check.py --url-only

      - name: Audit formulae
        shell: bash
        run: |
          brew audit --strict --online Formula/cnb-rs.rb
          brew audit --strict --online Formula/cnb-rs-musl.rb
